name: Release

env:
  GITHUB_TOKEN: ${{ secrets.SELF_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  GITHUB_BRANCH: ${{ github.ref_name }}

on:
  push:
    branches:
      - master

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.15.0
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Contributor
        run: GITHUB_TOKEN=$GITHUB_TOKEN pnpm build:contributor

      - name: Build Packages
        run: pnpm build

      - name: Fetch Github User Email
        run: git config --global user.email $(git log -n 1 --pretty=format:%ae)

      - name: Fetch Github User Name
        run: git config --global user.name $(git log -n 1 --pretty=format:%an)

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN && GITHUB_TOKEN=$GITHUB_TOKEN GITHUB_BRANCH=$GITHUB_BRANCH pnpm changeset:version
          publish: npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN && GITHUB_TOKEN=$GITHUB_TOKEN GITHUB_BRANCH=$GITHUB_BRANCH pnpm changeset:publish
          createGithubReleases: true
